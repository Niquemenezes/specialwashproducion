# Configuración Nginx con HTTPS (Let's Encrypt) para SpecialWash
# Dos dominios:
#   specialwash.studio        -> Frontend React
#   api.specialwash.studio    -> Backend Flask (:5000)

# ─────────────────────────────────────────────────────────────
# Redirigir HTTP → HTTPS (Frontend)
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name specialwash.studio www.specialwash.studio;

    # Necesario para la verificación ACME de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://specialwash.studio$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# Redirigir HTTP → HTTPS (API)
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.specialwash.studio;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.specialwash.studio$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS — specialwash.studio (Frontend React)
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name specialwash.studio www.specialwash.studio;

    # Certificados Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/specialwash.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/specialwash.studio/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Raíz del sitio
    root /var/www/specialwash/public_html;
    index index.html;

    # Aumentar tamaño máximo de subida para videos (100 MB)
    client_max_body_size 100M;

    # Timeouts para subidas grandes
    client_body_timeout  300s;
    proxy_read_timeout   300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout   300s;

    # Cabeceras anti-cache
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    add_header Pragma "no-cache";
    add_header Expires "0";

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Redirigir www → sin www
    if ($host = www.specialwash.studio) {
        return 301 https://specialwash.studio$request_uri;
    }

    # API desde el mismo dominio (evita CORS y errores 405 en login)
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
    }

    # Servir archivos estáticos directamente
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        try_files $uri =404;
        expires -1;
    }

    # Rutas de React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS — api.specialwash.studio (Backend Flask)
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.specialwash.studio;

    # Certificados Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/api.specialwash.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.specialwash.studio/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Aumentar tamaño máximo de subida para videos (100 MB)
    client_max_body_size 100M;

    # Timeouts para subidas grandes
    client_body_timeout  300s;
    proxy_read_timeout   300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout   300s;

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy total al backend Flask
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_cache_bypass          $http_upgrade;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout    300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
    }
}


